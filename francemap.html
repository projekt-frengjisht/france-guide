<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<title>Franca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

/* =====================
   GLOBAL
===================== */

html{
  scroll-behavior:smooth;
}

body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0f172a,#1e293b);
  color:#e0e7ff;
  margin:0;
  line-height:1.6;
  animation:fadePage 1s ease;
}

@keyframes fadePage{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Scrollbar */

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.25);
  border-radius:10px;
}

/* =====================
   HERO LAYOUT
===================== */

.main-hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* =====================
   HEADER
===================== */

header{
  padding:25px 20px 20px;
  text-align:center;
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.1);
}

h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(2rem,4vw,2.8rem);
  margin-bottom:8px;
  letter-spacing:.5px;
  color: #e0f0ff; /* White with subtle blue tint */
  text-shadow: 0 2px 6px rgba(0,123,255,0.4);
}

.subtitle{
  font-size:1.1rem;
  max-width:620px;
  margin:0 auto;
  color:#cbd5e1;
}

/* =====================
   MAP
===================== */

.map-container{
  position:relative;
  width:95%;
  max-width:900px;
  margin:auto;
  padding-bottom:30px;
}

.map-container img{
  width:100%;
  height:auto;
  display:block;
  border-radius:18px;
  box-shadow:0 20px 35px rgba(0,0,0,.6);
  transition:transform .6s ease;
}

.map-container:hover img{
  transform:scale(1.02);
}

/* =====================
   CITY BUTTONS
===================== */

.city{
  position:absolute;
  transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#1e40af,#3b82f6);
  color:white;
  padding:7px 15px;
  font-size:.85rem;
  border-radius:999px;
  text-decoration:none;
  box-shadow:0 6px 14px rgba(0,0,0,.35);
  transition:transform .25s ease,box-shadow .25s ease;
  font-weight:500;
}

.city:hover{
  transform:translate(-50%,-50%) scale(1.18);
  box-shadow:0 12px 25px rgba(0,0,0,.5);
}

/* Pulse */

.city::after{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:inherit;
  background:rgba(59,130,246,.25);
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%{
    transform:scale(.9);
    opacity:.6;
  }
  70%{
    transform:scale(1.3);
    opacity:0;
  }
}

/* =====================
   CITY POSITIONS
===================== */

#paris{top:28%;left:50%;}
#orleans{top:39%;left:44%;}
#lille{top:10%;left:47%;}
#nantes{top:44%;left:28%;}
#bordeaux{top:62%;left:30%;}
#clermont-ferrand{top:67%;left:50%;}
#bourges{top:55%;left:50%;}
#strasbourg{top:32%;left:71%;}
#lyon{top:59%;left:63%;}
#marseille{top:79%;left:62%;}
#toulouse{top:85%;left:40%;}

/* =====================
   TARTUFFE
===================== */

.tartuffe{
  position:fixed;
  bottom:20px;
  right:20px;
  cursor:pointer;
  z-index:999;
}

.tartuffe img{
  width:100px;
  transition:transform .3s ease;
}

.tartuffe:hover img{
  transform:scale(1.05);
}

.tartuffe-bubble{
  position:absolute;
  bottom:120%;
  right:0;
  background:#1e293b;
  color:#e0e7ff;
  padding:10px 14px;
  border-radius:14px;
  font-size:.9rem;
  box-shadow:0 10px 25px rgba(0,0,0,.5);
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
  white-space:nowrap;
}

/* speech arrow */

.tartuffe-bubble::after{
  content:"";
  position:absolute;
  bottom:-8px;
  right:18px;
  width:16px;
  height:16px;
  background:#1e293b;
  transform:rotate(45deg);
}

.tartuffe.show .tartuffe-bubble{
  opacity:1;
  transform:translateY(0);
}

/* =====================
   MOBILE
===================== */

@media (max-width:600px){

.subtitle{
  padding:0 10px;
}

.tartuffe img{
  width:85px;
}

}

</style>
</head>

<body>

<div class="main-hero">

<header>
<h1>Franca</h1>
<p class="subtitle">
Eksploro vlerat që ofrojnë qendrat turistike të Francës.
</p>
</header>

<div class="map-container">

<img src="https://uploads.onecompiler.io/43arb5wzh/448vzmv43/France.jpg">

<a class="city" id="lille" href="lille.html">Lille</a>
<a class="city" id="orleans" href="orleans.html">Orleans</a>
<a class="city" id="paris" href="paris.html">Paris</a>
<a class="city" id="nantes" href="nantes.html">Nantes</a>
<a class="city" id="bordeaux" href="bordeaux.html">Bordeaux</a>
<a class="city" id="bourges" href="bourges.html">Bourges</a>
<a class="city" id="clermont-ferrand" href="clermont-ferrand.html">Clermont-Ferrand</a>
<a class="city" id="strasbourg" href="strasbourg.html">Strasbourg</a>
<a class="city" id="lyon" href="lyon.html">Lyon</a>
<a class="city" id="marseille" href="marseille.html">Marseille</a>
<a class="city" id="toulouse" href="toulouse.html">Toulouse</a>

</div>

</div>

<!-- TARTUFFE -->

<div class="tartuffe"
onmouseenter="this.classList.add('show')"
onmouseleave="this.classList.remove('show')"
onclick="this.classList.toggle('show')">

<div class="tartuffe-bubble">
Kliko te një nga qytetet për të zbuluar më shumë
</div>

<img src="https://uploads.onecompiler.io/43arb5wzh/448vzmv43/Tartuffe.png">

</div>

</body>
</html>
