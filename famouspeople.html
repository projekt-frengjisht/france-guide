<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famous People</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
/* shared gradient for title and card text */
--text-gradient:linear-gradient(90deg,#ffffff,#e5e7eb,#cbd5e1);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

/* PAGE */

body{
background:linear-gradient(135deg,#14171c,#1f252d,#2a3038);
color:#e6e6e6;
min-height:100vh;
padding:90px 20px;
display:flex;
flex-direction:column;
align-items:center;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-track{
background:#14171c;
}

::-webkit-scrollbar-thumb{
background:linear-gradient(#3d4652,#6c7685);
border-radius:10px;
}

/* BACK BUTTON */

.back-button{
position:fixed;
top:25px;
left:25px;

width:52px;
height:52px;

border-radius:50%;
display:flex;
align-items:center;
justify-content:center;

font-size:22px;
text-decoration:none;
color:#e6e6e6;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 8px 25px rgba(0,0,0,0.6),
inset 0 1px 0 rgba(255,255,255,0.1);

transition:all .3s ease;
}

.back-button:hover{
transform:translateY(-3px) scale(1.05);

background:rgba(255,255,255,0.1);

box-shadow:
0 12px 30px rgba(0,0,0,0.8),
0 0 15px rgba(200,210,230,0.3),
inset 0 1px 0 rgba(255,255,255,0.2);
}

/* TITLE */

.title{
font-size:34px;
font-weight:600;
margin-bottom:50px;
letter-spacing:1px;

background:var(--text-gradient);
-webkit-background-clip:text;
background-clip:text;
color:transparent;

position:relative;
}

/* underline */

.title::after{
content:"";
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:-10px;

width:110px;
height:2px;

background:var(--text-gradient);
border-radius:3px;
opacity:0.8;
}

/* GRID */

.grid{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

/* CARD */

.card{
text-decoration:none;
color:#e6e6e6;
border-radius:20px;
overflow:hidden;
background:#2a3038;
border:1px solid #3a414c;
transition:all .3s ease;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 20px 45px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.2);
}

/* IMAGE */

.card img{
width:100%;
height:180px;
object-fit:cover;
transition:transform .4s ease;
}

.card:hover img{
transform:scale(1.05);
}

/* CARD TEXT */

.card p{
padding:14px;
text-align:center;
font-size:16px;
font-weight:500;
background:#242a31;

background-image:var(--text-gradient);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

/* MOBILE */

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
gap:25px;
}

.card img{
height:220px;
}

}

</style>
</head>

<body>

<a href="index.html" class="back-button">←</a>

<div class="title">Famous People</div>

<div class="grid">

<a href="#" class="card">
<img src="images/camus.jpg">
<p>Albert Camus</p>
</a>

<a href="#" class="card">
<img src="images/person2.jpg">
<p>Person 2</p>
</a>

<a href="#" class="card">
<img src="images/person3.jpg">
<p>Person 3</p>
</a>

<a href="#" class="card">
<img src="images/person4.jpg">
<p>Person 4</p>
</a>

<a href="#" class="card">
<img src="images/person5.jpg">
<p>Person 5</p>
</a>

<a href="#" class="card">
<img src="images/person6.jpg">
<p>Person 6</p>
</a>

<a href="#" class="card">
<img src="images/person7.jpg">
<p>Person 7</p>
</a>

<a href="#" class="card">
<img src="images/person8.jpg">
<p>Person 8</p>
</a>

<a href="#" class="card">
<img src="images/person9.jpg">
<p>Person 9</p>
</a>

</div>

</body>
</html>
