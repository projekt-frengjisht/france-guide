<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projet France</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;

  /* ☀️ LIGHT BACKGROUND */
  background-image:
    linear-gradient(rgba(255,255,255,0.65), rgba(255,255,255,0.65)),
    url("https://cdn1.matadornetwork.com/blogs/1/2011/05/Paris-France-cityscape-destinations-1200x900.jpg");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* MAIN AREA */

.stage{
  position:relative;
  width:1200px;
  height:100vh;
  margin:auto;
}

/* IMAGE STYLE */

.stage img{
  position:absolute;
  object-fit:cover;
  box-sizing:border-box;

  border:6px solid white;
  border-radius:12px;

  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* DESKTOP IMAGE LAYOUT */

.img-top{
  top:30px;
  left:180px;
  width:450px;
  height:250px;
}

.img-left{
  top:300px;
  left:20px;
  width:280px;
  height:360px;
}

.img-right{
  top:50px;
  right:40px;
  width:320px;
  height:500px;
}

/* BOTTOM IMAGE */

.bottom-wrapper{
  position:absolute;
  top:320px;
  left:400px;
  width:450px;
  height:300px;
}

.bottom-wrapper img{
  position:relative;
  width:100%;
  height:100%;
}

/* TITLE */

.title{
  position:absolute;
  top:180px;
  left:420px;

  font-family:'Playfair Display', serif;
  font-size:42px;
  font-weight:700;
  letter-spacing:2px;

  background:linear-gradient(145deg,#ffffff,#e9e9e9);
  padding:25px 90px;
  border-radius:70px;

  box-shadow:
    0 12px 0 #bdbdbd,
    0 22px 35px rgba(0,0,0,0.25);
}

/* 🔥 LIGHT 3D BUTTONS */

.btn{
  position:absolute;

  padding:16px 55px;
  border-radius:50px;

  font-size:20px;
  font-weight:600;
  text-decoration:none;
  color:#222;

  background:linear-gradient(145deg,#ffffff,#e9e9e9);

  border:1px solid #d1d5db;

  box-shadow:
    0 8px 0 #bdbdbd,
    0 18px 30px rgba(0,0,0,0.25);

  transition:all 0.2s ease;
}

.btn:hover{
  transform:translateY(-5px);

  box-shadow:
    0 14px 0 #bdbdbd,
    0 25px 40px rgba(0,0,0,0.3);
}

.btn:active{
  transform:translateY(4px);

  box-shadow:
    0 3px 0 #bdbdbd,
    0 10px 20px rgba(0,0,0,0.2);
}

/* BUTTON POSITIONS */

.cities{
  top:300px;
  left:260px;
}

.famous{
  top:380px;
  left:260px;
}

/* MOBILE */

@media (max-width:900px){

  .stage{
    width:100vw;
    height:100vh;
  }

  .img-top{
    width:55%;
    height:20%;
    left:5%;
    top:5%;
  }

  .img-left{
    width:40%;
    height:55%;
    left:3%;
    top:35%;
  }

  .img-right{
    width:40%;
    height:65%;
    right:3%;
    top:5%;
  }

  .bottom-wrapper{
    width:55%;
    height:40%;
    left:45%;
    bottom:10%;
    top:auto;
  }

  .title{
    top:23%;
    left:26%;
    font-size:9vw;
    padding:4vw 11vw;
    border-radius:12vw;
  }

  .btn{
    width:38%;
    height:8%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:5vw;
    border-radius:10vw;
    padding:0;
  }

  .cities{
    top:48%;
    left:10%;
  }

  .famous{
    top:60%;
    left:10%;
  }

}

</style>

</head>

<body>

<div class="stage">

<img class="img-top" src="img1.png">
<img class="img-left" src="img3.png">
<img class="img-right" src="img2.png">

<div class="bottom-wrapper">
  <img src="img4.png">
</div>

<div class="title">France</div>

<a href="francemap.html" class="btn cities">Villes</a>
<a href="famouspeople.html" class="btn famous">Personnalités</a>

</div>

</body>
</html>
