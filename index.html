<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>France Project</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background-image:
    linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)),
    url("https://cdn1.matadornetwork.com/blogs/1/2011/05/Paris-France-cityscape-destinations-1200x900.jpg");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

/* MAIN AREA */

.stage{
  position:relative;
  width:1200px;
  height:100vh;   /* fill full viewport height on desktop */
  margin:auto;
}

/* IMAGE STYLE */

.stage img{
  position:absolute;
  object-fit:cover;
  box-sizing:border-box;
  border:6px solid white;
  border-radius:12px;
}

/* DESKTOP IMAGE LAYOUT (ADJUSTED FOR FULL HEIGHT) */

.img-top{
  top:30px;
  left:180px;
  width:450px;
  height:250px;  /* increased height */
}

.img-left{
  top:300px;
  left:20px;
  width:280px;   /* slightly bigger */
  height:360px;  /* increased height */
}

.img-right{
  top:50px;
  right:40px;
  width:320px;   /* slightly bigger */
  height:500px;  /* increased height */
}

/* BOTTOM IMAGE WRAPPER */

.bottom-wrapper{
  position:absolute;
  top:320px;    /* moved slightly down */
  left:400px;
  width:450px;
  height:300px; /* increased height to fill space */
}

.bottom-wrapper img{
  position:relative;
  width:100%;
  height:100%;
}

/* TITLE */

.title{
  position:absolute;
  top:180px;
  left:420px;
  font-family:'Playfair Display', serif;
  letter-spacing:2px;
  background:linear-gradient(145deg,#ffffff,#e9e9e9);
  padding:25px 90px;
  font-size:42px;
  font-weight:700;
  border-radius:70px;
  box-shadow:
    0 12px 0 #bdbdbd,
    0 22px 35px rgba(0,0,0,0.25);
  text-shadow:0 2px 3px rgba(0,0,0,0.15);
}

/* BUTTON STYLE */

.btn{
  position:absolute;
  background:linear-gradient(145deg,#ffffff,#e9e9e9);
  padding:16px 55px;
  border-radius:45px;
  font-size:20px;
  font-weight:600;
  text-decoration:none;
  color:#222;
  letter-spacing:1px;
  box-shadow:
    0 8px 0 #bdbdbd,
    0 18px 30px rgba(0,0,0,0.25);
  transition:all 0.25s ease;
}

.btn:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:
    0 14px 0 #bdbdbd,
    0 25px 35px rgba(0,0,0,0.3);
}

.btn:active{
  transform:translateY(3px);
  box-shadow:
    0 5px 0 #bdbdbd,
    0 10px 18px rgba(0,0,0,0.2);
}

/* BUTTON POSITIONS */

.cities{
  top:300px;
  left:260px;
}

.famous{
  top:380px;
  left:260px;
}

.people{
  top:460px;
  left:260px;
}

/* LANGUAGE SWITCH (DESKTOP) */
@media (min-width: 901px) {
  .stage {
    padding-top: 40px; /* pushes everything down slightly */
    box-sizing: border-box; /* ensures padding doesn't break layout */
  }
}
.lang-switch{
  position:absolute;
  bottom:-40px; /* pulled up into viewport */
  right:-320px;  /* moved inside screen */
  display:flex;
  background:#f5f5f5;
  border-radius:40px;
  overflow:hidden;
  box-shadow:
    0 8px 0 #aaa,
    0 15px 25px rgba(0,0,0,0.2);
}

.lang-switch a{
  padding:10px 22px;
  text-decoration:none;
  color:black;
  font-weight:bold;
  font-size:14px;
  transition:0.2s;
}

.lang-switch a:hover{
  background:#e0e0e0;
}

.lang-switch a:first-child{
  border-right:2px solid #ccc;
}

/* PHONE ADAPTATION */

@media (max-width:900px){

  .stage{
    width:100vw;
    height:100vh;
  }

  .img-top{
    width:55%;
    height:20%;
    left:5%;
    top:5%;
  }

  .img-left{
    width:40%;
    height:55%;
    left:3%;
    top:35%;
  }

  .img-right{
    width:40%;
    height:65%;
    right:3%;
    top:5%;
  }

  .bottom-wrapper{
    width:55%;
    height:40%;
    left:45%;
    bottom:10%;
    top:auto;
  }

  .title{
    top:23%;
    left:26%;
    font-size:9vw;
    padding:4vw 11vw;
    border-radius:12vw;
  }

  .btn{
    width:38%;
    height:8%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:5vw;
    border-radius:10vw;
    padding:0;
  }

  .cities{
    top:48%;
    left:10%;
  }

  .famous{
    top:60%;
    left:10%;
  }

  .people{
    top:72%;
    left:10%;
  }

  .lang-switch{
    right:0;
    bottom:-35px;
  }

}

</style>

</head>

<body>

<div class="stage">

<img class="img-top" src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg">

<img class="img-left" src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg">

<img class="img-right" src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg">

<div class="bottom-wrapper">
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg">

  <div class="lang-switch">
    <a href="albanian.html">ALB</a>
    <a href="index.html">FRC</a>
  </div>
</div>

<div class="title">France</div>

<a href="francemap.html" class="btn cities">Cities</a>
<a href="famouspeople.html" class="btn famous">Famous</a>


</div>

</body>

</html>
